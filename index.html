<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursed Energy & Rune Magic</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Cinzel', serif; }
        #webcam { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: scaleX(-1); z-index: 1; }
        #skeleton-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 3; transform: scaleX(-1); pointer-events: none; }
        #three-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; pointer-events: none; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; text-shadow: 20px 20px 55px rgba(0,0,0,0.8); }
        h1 { font-size: 1.5rem; margin: 0; letter-spacing: 12px; font-weight: 900; background: linear-gradient(to bottom, #fafafa, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #technique-name { font-size: 2.0rem; color: #ffd900; margin-top: 8px; font-weight: bold; letter-spacing: 4px; }
        #status { position: absolute; bottom: 20px; left: 20px; color: #aaa; font-size: 10px; letter-spacing: 2px; z-index: 10; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="skeleton-canvas"></canvas>
    <div id="three-canvas"></div>
    <div id="status">INITIALIZING...</div>
    <div id="ui">
        <h1>ANIME MAGIC WITH COMPUTER VISION </h1> 
        <div id="technique-name">SENSING...</div>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('skeleton-canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusElement = document.getElementById('status');
    const nameEl = document.getElementById('technique-name');

    let scene, camera, renderer, particles, domainSphere, dogPrism;
    const COUNT = 30000;
    const targetPositions = new Float32Array(COUNT * 3);
    const targetColors = new Float32Array(COUNT * 3);
    const velocities = new Float32Array(COUNT * 3);
    
    let handPos = { x: 0, y: 0, z: 0 };
    let lastZ = 0;
    let heartBeatScale = 1.0;
    let currentTech = 'neutral';
    let time = 0;

    const FINGER_MAP = [
        { name: 'THUMB', ids: [0, 1, 2, 3, 4], color: '#00FF00' },
        { name: 'INDEX', ids: [0, 5, 6, 7, 8], color: '#00FFFF' },
        { name: 'MIDDLE', ids: [0, 9, 10, 11, 12], color: '#FF00FF' },
        { name: 'RING', ids: [0, 13, 14, 15, 16], color: '#FFFF00' },
        { name: 'PINKY', ids: [0, 17, 18, 19, 20], color: '#FF0000' }
    ];

    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 100;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-canvas').appendChild(renderer.domElement);

        const geometry = new THREE.SphereGeometry(15, 32, 32);
        const solidMat = new THREE.MeshBasicMaterial({ color: 0x0066ff, transparent: true, opacity: 0.3 });
        const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.5 });
        domainSphere = new THREE.Group();
        domainSphere.add(new THREE.Mesh(geometry, solidMat));
        domainSphere.add(new THREE.Mesh(geometry, wireMat));
        domainSphere.visible = false;
        scene.add(domainSphere);

        const prismGeo = new THREE.CylinderGeometry(12, 12, 20, 3);
        const prismMat = new THREE.MeshBasicMaterial({ color: 0xFF6600, transparent: true, opacity: 0.5 });
        const prismWire = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
        dogPrism = new THREE.Group();
        dogPrism.add(new THREE.Mesh(prismGeo, prismMat));
        dogPrism.add(new THREE.Mesh(prismGeo, prismWire));
        dogPrism.visible = false;
        scene.add(dogPrism);

        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(COUNT * 3);
        const colors = new Float32Array(COUNT * 3);

        for(let i=0; i<COUNT; i++) {
            positions[i*3] = (Math.random()-0.5) * 300;
            positions[i*3+1] = (Math.random()-0.5) * 300;
            positions[i*3+2] = (Math.random()-0.5) * 300;
            resetParticleVel(i);
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const particleMat = new THREE.PointsMaterial({ size: 0.7, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true });
        particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        updatePattern('neutral');
        animate();
    }

    function resetParticleVel(i) {
        velocities[i*3] = (Math.random() - 0.5) * 2;
        velocities[i*3+1] = (Math.random() - 0.5) * 2;
        velocities[i*3+2] = (Math.random() - 0.5) * 2;
    }

    function triggerExplosion() {
        const posAttr = particles.geometry.attributes.position;
        for(let i=0; i<COUNT; i++) {
            const idx = i * 3;
            velocities[idx] = (posAttr.array[idx] - handPos.x) * (Math.random() * 0.5);
            velocities[idx+1] = (posAttr.array[idx+1] - handPos.y) * (Math.random() * 0.5);
            velocities[idx+2] = (posAttr.array[idx+2] - 0) * (Math.random() * 0.5);
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        time += 0.05;
        
        domainSphere.position.set(handPos.x, handPos.y, 0);
        domainSphere.rotation.y += 0.01;
        
        dogPrism.position.set(handPos.x, handPos.y, 0);
        dogPrism.rotation.x += 0.02;
        dogPrism.rotation.z += 0.01;

        const posAttr = particles.geometry.attributes.position;
        const colAttr = particles.geometry.attributes.color;

        // Smoothly return heartbeat to normal size
        heartBeatScale += (1.0 - heartBeatScale) * 0.1;

        for(let i=0; i<COUNT; i++) {
            const idx = i * 3;
            
            if (currentTech === 'kon') {
                const angle = (i / COUNT) * Math.PI * 2 + time;
                const h = (Math.sin(i) * 15);
                const rad = 15 + Math.cos(time + i) * 5;
                const tx = handPos.x + Math.cos(angle) * rad;
                const ty = handPos.y + h;
                const tz = Math.sin(angle) * rad;
                posAttr.array[idx] += (tx - posAttr.array[idx]) * 0.15;
                posAttr.array[idx+1] += (ty - posAttr.array[idx+1]) * 0.15;
                posAttr.array[idx+2] += (tz - posAttr.array[idx+2]) * 0.15;
            } else if (currentTech === 'rune' || currentTech === 'fangirl') {
                // Apply heartBeatScale ONLY to the fangirl effect positions relative to center
                const s = currentTech === 'fangirl' ? heartBeatScale : 1.0;
                posAttr.array[idx] += (handPos.x + (targetPositions[idx] * s) - posAttr.array[idx]) * 0.12;
                posAttr.array[idx+1] += (handPos.y + (targetPositions[idx+1] * s) - posAttr.array[idx+1]) * 0.12;
                posAttr.array[idx+2] += (targetPositions[idx+2] - posAttr.array[idx+2]) * 0.12;
            } else {
                let lerpFactor = (currentTech === 'gojo') ? 0.12 : 0.01;
                if (currentTech === 'neutral') {
                    posAttr.array[idx] += velocities[idx];
                    posAttr.array[idx+1] += velocities[idx+1];
                    posAttr.array[idx+2] += velocities[idx+2];
                    velocities[idx] *= 0.96; velocities[idx+1] *= 0.96; velocities[idx+2] *= 0.96;
                }
                posAttr.array[idx] += (targetPositions[idx] - posAttr.array[idx]) * lerpFactor;
                posAttr.array[idx+1] += (targetPositions[idx+1] - posAttr.array[idx+1]) * lerpFactor;
                posAttr.array[idx+2] += (targetPositions[idx+2] - posAttr.array[idx+2]) * lerpFactor;
            }

            colAttr.array[idx] += (targetColors[idx] - colAttr.array[idx]) * 0.1;
            colAttr.array[idx+1] += (targetColors[idx+1] - colAttr.array[idx+1]) * 0.1;
            colAttr.array[idx+2] += (targetColors[idx+2] - colAttr.array[idx+2]) * 0.1;
        }
        posAttr.needsUpdate = true;
        colAttr.needsUpdate = true;
        renderer.render(scene, camera);
    }

    function updatePattern(type) {
        if (currentTech === type) return;
        if (currentTech !== 'neutral' && type === 'neutral') triggerExplosion();
        
        domainSphere.visible = (type === 'gojo');
        dogPrism.visible = (type === 'kon');
        currentTech = type;

        for(let i=0; i<COUNT; i++) {
            const idx = i * 3;
            if (type === 'gojo') {
                const phi = Math.acos(-1 + (2 * i) / COUNT);
                const theta = Math.sqrt(COUNT * Math.PI) * phi;
                const radius = 14 + Math.random() * 2;
                targetPositions[idx] = handPos.x + radius * Math.cos(theta) * Math.sin(phi);
                targetPositions[idx+1] = handPos.y + radius * Math.sin(theta) * Math.sin(phi);
                targetPositions[idx+2] = radius * Math.cos(phi);
                targetColors[idx] = 0; targetColors[idx+1] = 0.5; targetColors[idx+2] = 1; 
            } else if (type === 'kon') {
                targetColors[idx] = 1.0; targetColors[idx+1] = 0.4; targetColors[idx+2] = 0.0;
            } else if (type === 'rune') {
                if (i < COUNT * 0.4) {
                    const angle = (i / (COUNT * 0.4)) * Math.PI * 2;
                    const r = 30;
                    targetPositions[idx] = Math.cos(angle) * r;
                    targetPositions[idx+1] = 25;
                    targetPositions[idx+2] = Math.sin(angle) * r;
                    targetColors[idx] = 1.0; targetColors[idx+1] = 0.8; targetColors[idx+2] = 0.2;
                } else {
                    const pillarIdx = i % 4;
                    const offsets = [{x:18, z:18}, {x:-18, z:18}, {x:18, z:-18}, {x:-18, z:-18}];
                    const h = (Math.random() - 0.5) * 70;
                    targetPositions[idx] = offsets[pillarIdx].x + (Math.random()-0.5)*4;
                    targetPositions[idx+1] = -h;
                    targetPositions[idx+2] = offsets[pillarIdx].z + (Math.random()-0.5)*4;
                    targetColors[idx] = 1.0; targetColors[idx+1] = 0.1; targetColors[idx+2] = 0.5;
                }
            } else if (type === 'fangirl') {
                const t = (i / COUNT) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                targetPositions[idx] = x * 1.8;
                targetPositions[idx+1] = y * 1.8;
                targetPositions[idx+2] = (Math.random() - 0.5) * 10;
                targetColors[idx] = 1.0; targetColors[idx+1] = 0.1; targetColors[idx+2] = 0.3;
            } else {
                const angle = (i / COUNT) * Math.PI * 2;
                const rad = 20 + Math.random() * 10;
                targetPositions[idx] = Math.cos(angle) * rad; 
                targetPositions[idx+1] = Math.sin(angle) * rad; 
                targetPositions[idx+2] = (Math.random()-0.5)*20;
                targetColors[idx] = 0.8; targetColors[idx+1] = 0.7; targetColors[idx+2] = 0.3;
            }
        }
        
        const names = { 
            gojo: "五条悟 GOJO INFINITE VOID", 
            kon: "コン (KON) CHAINSAW MAN", 
            rune: "魔法少女まどか☆マギカ MADOKA MAGICA", 
            fangirl: "ドキドキ DOKI DOKI FANGIRL",
            neutral: "GATHERING MANA..." 
        };
        const colors = { gojo: "#00d4ff", kon: "#ff6600", rune: "#ff0077", fangirl: "#ff3366", neutral: "#d4af37" };
        nameEl.innerText = names[type];
        nameEl.style.color = colors[type];
    }

    function drawSkeleton(landmarks, colorSet) {
        FINGER_MAP.forEach(finger => {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = finger.color;
            canvasCtx.lineWidth = 3;
            for (let i = 0; i < finger.ids.length - 1; i++) {
                const start = landmarks[finger.ids[i]];
                const end = landmarks[finger.ids[i+1]];
                canvasCtx.moveTo(start.x * canvasElement.width, start.y * canvasElement.height);
                canvasCtx.lineTo(end.x * canvasElement.width, end.y * canvasElement.height);
            }
            canvasCtx.stroke();
            finger.ids.forEach(id => {
                const lm = landmarks[id];
                const x = lm.x * canvasElement.width;
                const y = lm.y * canvasElement.height;
                canvasCtx.fillStyle = "white";
                canvasCtx.beginPath();
                canvasCtx.arc(x, y, 3, 0, Math.PI * 2);
                canvasCtx.fill();
                if(id === 4 || id === 8 || id === 12 || id === 16 || id === 20 || id === 0) {
                    canvasCtx.fillStyle = finger.color;
                    canvasCtx.font = "10px Arial";
                    canvasCtx.fillText(id === 0 ? "WRIST" : "TIP", x + 5, y);
                }
            });
        });
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6 });

    hands.onResults((results) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            let detected = 'neutral';
            let centerX = 0, centerY = 0, centerZ = 0;
            results.multiHandLandmarks.forEach(h => {
                centerX += h[9].x; centerY += h[9].y; centerZ += h[9].z;
                drawSkeleton(h);
            });
            
            const avgZ = centerZ / results.multiHandLandmarks.length;
            handPos.x = (centerX / results.multiHandLandmarks.length - 0.5) * -150;
            handPos.y = (0.5 - centerY / results.multiHandLandmarks.length) * 100;

            if (results.multiHandLandmarks.length === 2) {
                const h1 = results.multiHandLandmarks[0];
                const h2 = results.multiHandLandmarks[1];
                const thumbDist = Math.hypot(h1[4].x - h2[4].x, h1[4].y - h2[4].y);
                const indexDist = Math.hypot(h1[8].x - h2[8].x, h1[8].y - h2[8].y);
                
                if (thumbDist < 0.1 && indexDist < 0.1) {
                    detected = 'fangirl';
                    // Calculate "shake" velocity based on Z-depth change
                    let zVelocity = Math.abs(avgZ - lastZ);
                    if (zVelocity > 0.005) {
                        heartBeatScale = 1.0 + (zVelocity * 40); // Pulse effect
                    }
                } else if (Math.hypot(h1[9].x - h2[9].x, h1[9].y - h2[9].y) < 0.25) {
                    detected = 'rune';
                }
            } else {
                const h = results.multiHandLandmarks[0];
                const distIndexMiddle = Math.hypot(h[8].x - h[12].x, h[8].y - h[12].y);
                const d1 = Math.hypot(h[12].x - h[4].x, h[12].y - h[4].y);
                const d2 = Math.hypot(h[16].x - h[4].x, h[16].y - h[4].y);
                if (distIndexMiddle < 0.025 && h[12].y < h[10].y) detected = 'gojo';
                else if (d1 < 0.06 && d2 < 0.06 && h[8].y < h[6].y && h[20].y < h[18].y) detected = 'kon';
            }
            
            lastZ = avgZ;
            updatePattern(detected);
            statusElement.textContent = "SYSTEM ACTIVE";
        } else {
            updatePattern('neutral');
        }
    });

    const cameraHelper = new Camera(videoElement, {
        onFrame: async () => { 
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            await hands.send({image: videoElement}); 
        },
        width: 1280, height: 720
    });

    initThree();
    cameraHelper.start();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
