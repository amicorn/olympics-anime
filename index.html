<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frieren Magic - Camera Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Cinzel', serif; }
        
        /* Full Screen Camera */
        #webcam {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
            background: #222; /* Fallback to see if element exists */
        }

        #three-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 5;
            pointer-events: none;
        }

        #ui {
            position: absolute; top: 5%; width: 100%; text-align: center; color: #fff; 
            pointer-events: none; z-index: 10; text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        h1 { font-size: 2.2rem; margin: 0; letter-spacing: 12px; }
        #technique-name { color: #d4af37; margin-top: 8px; letter-spacing: 4px; }

        #status {
            position: absolute; bottom: 20px; left: 20px;
            color: #fff; background: rgba(0,0,0,0.7);
            padding: 8px 15px; border-radius: 20px; z-index: 20; font-size: 12px;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <div id="three-canvas"></div>
    <div id="status">Waiting for Camera...</div>

    <div id="ui">
        <h1>葬送のフリーレン</h1> 
        <div id="technique-name">SENSING MANA...</div>
    </div>

<script>
    const videoElement = document.getElementById('webcam');
    const statusElement = document.getElementById('status');
    const nameEl = document.getElementById('technique-name');

    // --- Three.js Setup ---
    let scene, camera, renderer, particles;
    const COUNT = 25000;
    const targetPositions = new Float32Array(COUNT * 3);
    const targetColors = new Float32Array(COUNT * 3);
    let handPos = { x: 0, y: 0 };

    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 80;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('three-canvas').appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(COUNT * 3);
        const colors = new Float32Array(COUNT * 3);

        for(let i=0; i<COUNT; i++) {
            positions[i*3] = (Math.random()-0.5) * 100;
            positions[i*3+1] = (Math.random()-0.5) * 100;
            positions[i*3+2] = (Math.random()-0.5) * 100;
            targetPositions[i*3] = positions[i*3];
            targetPositions[i*3+1] = positions[i*3+1];
            targetPositions[i*3+2] = positions[i*3+2];
        }

        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const mat = new THREE.PointsMaterial({
            size: 0.5,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.8
        });

        particles = new THREE.Points(geo, mat);
        scene.add(particles);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Smoothly follow hand
        particles.position.x += (handPos.x - particles.position.x) * 0.1;
        particles.position.y += (handPos.y - particles.position.y) * 0.1;
        particles.rotation.y += 0.005;

        const posAttr = particles.geometry.attributes.position;
        const colAttr = particles.geometry.attributes.color;

        for(let i=0; i<COUNT*3; i++) {
            posAttr.array[i] += (targetPositions[i] - posAttr.array[i]) * 0.1;
            colAttr.array[i] += (targetColors[i] - colAttr.array[i]) * 0.1;
        }
        
        posAttr.needsUpdate = true;
        colAttr.needsUpdate = true;
        renderer.render(scene, camera);
    }

    // --- Patterns ---
    function setPattern(type) {
        for(let i=0; i<COUNT; i++) {
            let x, y, z, r, g, b;
            if (type === 'heart') {
                const t = (i / COUNT) * Math.PI * 2;
                x = 16 * Math.pow(Math.sin(t), 3);
                y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                z = (Math.random()-0.5)*5;
                r=1; g=0.2; b=0.5;
            } else if (type === 'fire') {
                const t = i / COUNT;
                const angle = t * Math.PI * 20;
                x = Math.cos(angle) * (5 + t * 30);
                y = t * -80 + 40;
                z = Math.sin(angle) * (5 + t * 30);
                r=1; g=0.4; b=0;
            } else {
                x = (Math.random()-0.5)*40; y = (Math.random()-0.5)*40; z = (Math.random()-0.5)*40;
                r=0.8; g=0.7; b=0.2;
            }
            targetPositions[i*3] = x; targetPositions[i*3+1] = y; targetPositions[i*3+2] = z;
            targetColors[i*3] = r; targetColors[i*3+1] = g; targetColors[i*3+2] = b;
        }
    }

    // --- Hand Tracking ---
    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

    hands.onResults((results) => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            statusElement.textContent = "Mana Detected";
            const h = results.multiHandLandmarks[0];
            handPos.x = (h[9].x - 0.5) * 100;
            handPos.y = (0.5 - h[9].y) * 80;

            const isUp = h[8].y < h[6].y;
            const isPinch = Math.hypot(h[4].x - h[8].x, h[4].y - h[8].y) < 0.05;

            if (isPinch) {
                setPattern('heart');
                nameEl.innerText = "BLOOMING KISS";
            } else if (isUp) {
                setPattern('fire');
                nameEl.innerText = "SOLAR FLARE";
            } else {
                setPattern('neutral');
                nameEl.innerText = "SENSING...";
            }
        } else {
            statusElement.textContent = "No Hands in View";
        }
    });

    // --- Start ---
    const cameraHelper = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });

    initThree();
    cameraHelper.start()
        .then(() => statusElement.textContent = "Camera Active")
        .catch(e => statusElement.textContent = "Error: " + e);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
