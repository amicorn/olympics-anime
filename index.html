 <!-- entrypoint for the application, sets up the HTML structure and includes necessary libraries and stylesheets. It also initializes the webcam and canvas elements for rendering the hand tracking and 3D effects. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursed Energy & Rune Magic</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="skeleton-canvas"></canvas>
    <div id="three-canvas"></div>
    <div id="status">INITIALIZING...</div>
    <div id="ui">
        <h1>ANIME MAGIC WITH COMPUTER VISION</h1> 
        <div id="technique-name">SENSING...</div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
